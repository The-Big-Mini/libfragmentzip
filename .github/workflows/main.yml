name: Buildrunner

on: [push]

jobs:
  build:

    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    env:
      BUILDROOT: "buildroot_${{ matrix.platform }}"
      GIT_DEPENDENCIES: tihmstar/libgeneral

    steps:
    - uses: actions/checkout@v4
    - name: prepre buildroot
      run: mkdir $BUILDROOT
    - name:  Install pre-dependencies
      run: |
         mkdir predep
         if [ "$RUNNER_OS" == "Linux" ]; then
              sudo apt-get install -y libssl-dev libcurl4-openssl-dev libzip-dev

         elif [ "$RUNNER_OS" == "macOS" ]; then
              brew install autoconf automake libtool pkg-config libzip

         else
              echo "$RUNNER_OS not supported"
              exit 1
         fi
      shell: bash
    - name: download dependencies
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        get_latest_release() {
          curl --silent --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' "https://api.github.com/repos/$1/releases/latest" | # Get latest release from GitHub api
          grep '"tag_name":' |                                            # Get tag line
          rev | cut -d '"' -f2 | rev                                   # Pluck JSON value
        }
        mkdir depdir
        cd depdir
        mkdir $BUILDROOT
        IFS=',' read -r -a deparray <<< "$GIT_DEPENDENCIES"; for d in ${deparray[@]}; do
          echo "Got dependency: $d"
          r=$(echo $d | cut -d '/' -f 2)
          echo "Got reponame: $r"
          tag=$(get_latest_release $d);
          echo "Found tag: $tag"
          wget "https://github.com/$d/releases/download/$tag/$BUILDROOT.zip"
          unzip -u "$BUILDROOT.zip"
          rm "$BUILDROOT.zip"
        done
        echo "moving dependencies to /"
        sudo cp -r $BUILDROOT/* /
        cd ..
        rm -rf depdir
    - name: autogen
      run: ./autogen.sh --enable-static --disable-shared
    - name: make
      run: make
    - name: make install
      run: make DESTDIR=$GITHUB_WORKSPACE/$BUILDROOT install
    - uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILDROOT }}
        path: ${{ env.BUILDROOT }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Download ubuntu artifact
      uses: actions/download-artifact@v4
      with:
        name: buildroot_ubuntu-latest
        path: buildroot_ubuntu-latest
    - name: Download macos artifact
      uses: actions/download-artifact@v4
      with:
        name: buildroot_macos-latest
        path: buildroot_macos-latest
    - name: Set env vars and zip
      run: |
        echo "BUILD_VERSION_NUM=$(git rev-list --count HEAD | tr -d '\n')" >> $GITHUB_ENV
        echo "BUILD_VERSION_SHA=$(git rev-parse HEAD | tr -d '\n')" >> $GITHUB_ENV
        echo "BUILD_VERSION_STR=$(git rev-list --count HEAD | tr -d '\n')-$(git rev-parse HEAD | tr -d '\n')" >> $GITHUB_ENV
        echo "COMMIT_MSG=$(git log -1 --pretty=%B | head -1)" >> $GITHUB_ENV
        zip -r buildroot_macos-latest.zip buildroot_macos-latest
        zip -r buildroot_ubuntu-latest.zip buildroot_ubuntu-latest
    - name: Create or update release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="${{ env.BUILD_VERSION_NUM }}"
        BODY="${{ env.COMMIT_MSG }}"
        if gh release view "$TAG" > /dev/null 2>&1; then
          gh release edit "$TAG" --title "Build ${{ env.BUILD_VERSION_STR }}" --notes "$BODY"
          gh release upload "$TAG" buildroot_ubuntu-latest.zip buildroot_macos-latest.zip --clobber
        else
          gh release create "$TAG" \
            --title "Build ${{ env.BUILD_VERSION_STR }}" \
            --notes "$BODY" \
            buildroot_ubuntu-latest.zip \
            buildroot_macos-latest.zip
        fi
